<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Sub-Perfect Colors</title>
        <script src="https://cdn.jsdelivr.net/npm/fraction.js@4.3.7/fraction.min.js"></script>
        <style>
            body{
                text-align: center;
            }
            .lightness{
                color: black;
                text-align: center; font-size: 50px; font-family: Arial, Helvetica, sans-serif;
            }
            .outer{
                width: 40px; height: 40px;
                background-color: red;
                border-radius: 0px;
                display:flex;
                justify-content:center;
                align-items:center;
            }
            .color{
                width: 30px; height: 30px;
                border: 2px solid #000000; border-radius: 15px;
                margin: 5px;
            }
            .colors{
                width: 400px;
                margin-left: auto;
                margin-right: auto;
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px;
            }
        </style>
    </head>
    <body>
        <h2 class="lightness">Lightness: 0</h2>
        <div class="colors">
            <div class="outer">
                <button class="color" style="background-color: black;"></button>
            </div>
        </div>
        <br><br><br><br><br>
        <script>
            display("1/2", [
                [true , false, false, false,        true ,      false, true , false, true ],
                [false, false, false, false,        false,      false, false, false, false],
                [false, false, false, true ,        true ,      true , false, false, false],
                [false, false, false, false,        false,      false, false, false, false],

                [true , false, false, false,        true ,      false, true , false, false],

                [false, false, false, false,        false,      false, true , false, false],
                [false, false, false, false,        false,      true , false, false, true ],
                [false, false, false, false,        false,      false, false, false, true ],
                [false, false, false, false,        true ,      false, false, false, true ],
            ]);
            display("1", [
                [true , false, false, false,        true ,      false, true , false, true ],
                [false, false, false, false,        false,      false, false, false, false],
                [false, false, true , true ,        true ,      true , false, false, true ],
                [false, false, false, false,        true ,      false, true , false, false],

                [true , false, false, false,        true ,      false, true , false, true ],

                [false, false, false, false,        false,      false, true , false, false],
                [false, false, false, false,        false,      true , false, false, true ],
                [false, false, false, false,        false,      false, false, false, true ],
                [false, false, false, false,        true ,      false, false, false, true ],
            ]);
            function display(lightness, subPerfectColors){
                var title=document.createElement("h2");
                document.body.appendChild(title);
                title.className="lightness";
                title.textContent="Lightness: "+lightness;

                var section=document.createElement("div");
                document.body.appendChild(section);
                section.className="colors";
                for(var i=0; i<9; i++){
                    for(var j=0; j<9; j++){
                        var square=document.createElement("div");
                        square.className="outer";
                        section.appendChild(square);
                        if(i==4&&j==4) square.style.backgroundColor="yellow";
                        else if(i==4||j==4) square.style.backgroundColor="lime";
                        if(subPerfectColors[i][j]){
                            var subPerfectColor;
                            {
                                var YB; var YBV;
                                if(j<4){YB="Y"; YBV=(4-j)+"/4";}
                                else if(j==4){YB=""; YBV="0"}
                                else if(j>4){YB="B"; YBV=(j-4)+"/4";}

                                var RG; var RGV;
                                if(i<4){RG="R"; RGV=(4-i)+"/4";}
                                else if(i==4){RG=""; RGV="0"}
                                else if(i>4){RG="G"; RGV=(i-4)+"/4";}

                                subPerfectColor=color(lightness, YB, YBV, RG, RGV);
                            }
                            var button=document.createElement("button");
                            button.className="color";
                            button.style.backgroundColor=subPerfectColor;
                            square.appendChild(button);
                        }
                    }
                }
                document.body.appendChild(document.createElement("br"));
                document.body.appendChild(document.createElement("br"));
                document.body.appendChild(document.createElement("br"));
                document.body.appendChild(document.createElement("br"));
                document.body.appendChild(document.createElement("br"));
            }
            function color(L, YB, YBV, RG, RGV){
                L=Fraction(L); YBV=Fraction(YBV); RGV=Fraction(RGV);
                var R=0; var G=0; var B=0;
                if(YB=="Y"&&RG=="R"){
                    R=Fraction("1");
                    if(greaterEqual(YBV, RGV)) G=(Fraction("1")).sub(RGV.div(Fraction("2"))); else G=((Fraction("1")).sub(RGV)).add(YBV.div(Fraction("2")));
                    B=(Fraction("1")).sub(max());
                }else if(YB=="Y"&&RG==""){
                    R=Fraction("1");
                    G=Fraction("1");
                    B=(Fraction("1")).sub(YBV);
                }else if(YB=="Y"&&RG=="G"){
                    if(greaterEqual(YBV, RGV)) R=(Fraction("1")).sub(RGV.div(Fraction("2"))); else R=((Fraction("1")).sub(RGV)).add(YBV.div(Fraction("2")));
                    G=Fraction("1");
                    B=(Fraction("1")).sub(max());
                }else if(YB==""&&RG=="R"){
                    R=Fraction("1");
                    G=(Fraction("1")).sub(RGV);
                    B=(Fraction("1")).sub(RGV);
                }else if(YB==""&&RG==""){
                    R=Fraction("1");
                    G=Fraction("1");
                    B=Fraction("1");
                }else if(YB==""&&RG=="G"){
                    R=(Fraction("1")).sub(RGV);
                    G=Fraction("1");
                    B=(Fraction("1")).sub(RGV);
                }else if(YB=="B"&&RG=="R"){
                    if(greaterEqual(RGV, YBV)){R=Fraction("1"); B=((Fraction("1")).sub(RGV)).add(YBV);}
                    else{R=((Fraction("1")).sub(YBV)).add(RGV); B=Fraction("1");}
                    G=(Fraction("1")).sub(max());
                }else if(YB=="B"&&RG==""){
                    R=(Fraction("1")).sub(YBV);
                    G=(Fraction("1")).sub(YBV);
                    B=Fraction("1");
                }else if(YB=="B"&&RG=="G"){
                    if(greaterEqual(RGV, YBV)){G=Fraction("1"); B=((Fraction("1")).sub(RGV)).add(YBV);}
                    else{G=((Fraction("1")).sub(YBV)).add(RGV); B=Fraction("1");}
                    R=(Fraction("1")).sub(max());
                }
                R=L.mul(R); G=L.mul(G); B=L.mul(B);

                R=(R.mul(Fraction("255"))).round().valueOf(); G=(G.mul(Fraction("255"))).round().valueOf(); B=(B.mul(Fraction("255"))).round().valueOf();
                return "rgb("+R+", "+G+", "+B+")";
                function max(){if(greaterEqual(YBV, RGV)) return YBV; else return RGV;}
                function greaterEqual(first, next){if(first.compare(next)>=0) return true; else return false;} //greater than or equal to
            }
        </script>
    </body>
</html>
