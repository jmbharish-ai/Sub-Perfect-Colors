<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Sub-Perfect Colors</title>
        <script src="https://cdn.jsdelivr.net/npm/fraction.js@4.3.7/fraction.min.js"></script>
        <style>
            body{
                text-align: center;
            }
            .outer{
                width: 40px; height: 40px;
                background-color: red;
                border-radius: 0px;
                display:flex;
                justify-content:center;
                align-items:center;
            }
            .color{
                width: 30px; height: 30px;
                border: 2px solid #000000; border-radius: 15px;
                margin: 5px;
            }
            .colors{
                width: 400px;
                margin-left: auto;
                margin-right: auto;
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px;
            }
        </style>
    </head>
    <body>
        <script>
            display("Yellow, Red", [
                color("1", "Y", "1/2", "R", "1/2"),
                color("1", "Y", "1/4", "R", "1/2"),
                color("1/2", "Y", "1", "R", "1/2"),
                color("1", "Y", "1", "R", "1"),
                color("1/2", "Y", "1/4", "R", "1/2"),
                color("1/2", "Y", "1/2", "R", "1/2"),
                color("1", "Y", "1", "R", "1/2"),
                color("1/2", "Y", "1", "R", "1"),
                color("0", "", "0", "", "0"),
                color("1/2", "", "0", "", "0"),
                color("1", "", "0", "", "0"),
                color("1", "", "0", "R", "1/4"),
                color("1", "Y", "1", "", "0"),
                color("1/2", "", "0", "R", "1/4"),
                color("1/2", "Y", "1", "", "0"),
                color("1", "", "0", "R", "1/2"),
                color("1", "", "0", "R", "1"),
                color("1/2", "", "0", "R", "1/2"),
                color("1/2", "", "0", "R", "1")
            ]);
            display("Yellow, Green", [
                color("0", "", "0", "", "0"),
                color("1/2", "", "0", "", "0"),
                color("1", "", "0", "", "0"),
                color("1/2", "", "0", "G", "1"),
                color("1", "", "0", "G", "1"),
                color("1", "Y", "1", "", "0"),
                color("1/2", "Y", "1", "", "0")
            ]);
            display("Blue, Red", [
                color("1", "B", "1", "R", "1/2"),
                color("1", "B", "1/4", "R", "1/2"),
                color("1", "B", "1", "R", "1"),
                color("1/2", "B", "1/2", "R", "1/2"),
                color("1/2", "B", "1", "R", "1"),
                color("1", "B", "1", "R", "3/4"),
                color("1", "B", "1/2", "R", "1/4"),
                color("1", "B", "1/2", "R", "1"),
                color("1/2", "B", "1/4", "R", "1/2"),
                color("1/2", "B", "1/2", "R", "1"),
                color("0", "", "0", "", "0"),
                color("1/2", "", "0", "", "0"),
                color("1", "", "0", "", "0"),
                color("1/2", "B", "1/2", "", "0"),
                color("1", "", "0", "R", "1/4"),
                color("1", "B", "1", "", "0"),
                color("1", "B", "1/2", "", "0"),
                color("1/2", "", "0", "R", "1/4"),
                color("1", "", "0", "R", "1/2"),
                color("1", "", "0", "R", "1"),
                color("1/2", "", "0", "R", "1/2"),
                color("1/2", "", "0", "R", "1")
            ]);
            display("Blue, Green", [
                color("1/2", "B", "1/4", "G", "1/2"),
                color("1/2", "B", "1", "G", "1/2"),
                color("1/2", "B", "1", "G", "3/4"),
                color("1", "B", "1", "G", "1"),
                color("1/2", "B", "1", "G", "1"),
                color("1", "B", "1/4", "G", "1/2"),
                color("1/2", "B", "1/2", "G", "1/4"),
                color("1", "B", "1", "G", "3/4"),
                color("1", "B", "1", "G", "1/2"),
                color("1", "B", "1/2", "G", "1/4"),
                color("0", "", "0", "", "0"),
                color("1/2", "", "0", "", "0"),
                color("1", "", "0", "", "0"),
                color("1/2", "B", "1/2", "", "0"),
                color("1/2", "", "0", "G", "1"),
                color("1", "", "0", "G", "1"),
                color("1", "B", "1", "", "0"),
                color("1", "B", "1/2", "", "0")
            ]);
            function display(area, subPerfectColors){
                var title=document.createElement("h2");
                document.body.appendChild(title);
                title.textContent=area;

                var section=document.createElement("div");
                document.body.appendChild(section);
                section.className="colors";
                for(var i=0; i<subPerfectColors.length; i++){
                    var color=document.createElement("div");
                    color.className="outer";
                    color.id=subPerfectColors[i];
                    section.appendChild(color);
                    var button=document.createElement("button");
                    button.className="color";
                    button.style.backgroundColor=subPerfectColors[i];
                    color.appendChild(button);
                }
                document.body.appendChild(document.createElement("br"));
                document.body.appendChild(document.createElement("br"));
                document.body.appendChild(document.createElement("br"));
                document.body.appendChild(document.createElement("br"));
                document.body.appendChild(document.createElement("br"));
            }
            function color(L, YB, YBV, RG, RGV){
                L=Fraction(L); YBV=Fraction(YBV); RGV=Fraction(RGV);
                var R=0; var G=0; var B=0;
                if(YB=="Y"&&RG=="R"){
                    R=Fraction("1");
                    if(greaterEqual(YBV, RGV)) G=(Fraction("1")).sub(RGV.div(Fraction("2"))); else G=((Fraction("1")).sub(RGV)).add(YBV.div(Fraction("2")));
                    B=(Fraction("1")).sub(max());
                }else if(YB=="Y"&&RG==""){
                    R=Fraction("1");
                    G=Fraction("1");
                    B=(Fraction("1")).sub(YBV);
                }else if(YB=="Y"&&RG=="G"){
                    if(greaterEqual(YBV, RGV)) R=(Fraction("1")).sub(RGV.div(Fraction("2"))); else R=((Fraction("1")).sub(RGV)).add(YBV.div(Fraction("2")));
                    G=Fraction("1");
                    B=(Fraction("1")).sub(max());
                }else if(YB==""&&RG=="R"){
                    R=Fraction("1");
                    G=(Fraction("1")).sub(RGV);
                    B=(Fraction("1")).sub(RGV);
                }else if(YB==""&&RG==""){
                    R=Fraction("1");
                    G=Fraction("1");
                    B=Fraction("1");
                }else if(YB==""&&RG=="G"){
                    R=(Fraction("1")).sub(RGV);
                    G=Fraction("1");
                    B=(Fraction("1")).sub(RGV);
                }else if(YB=="B"&&RG=="R"){
                    if(greaterEqual(RGV, YBV)){R=Fraction("1"); B=((Fraction("1")).sub(RGV)).add(YBV);}
                    else{R=((Fraction("1")).sub(YBV)).add(RGV); B=Fraction("1");}
                    G=(Fraction("1")).sub(max());
                }else if(YB=="B"&&RG==""){
                    R=(Fraction("1")).sub(YBV);
                    G=(Fraction("1")).sub(YBV);
                    B=Fraction("1");
                }else if(YB=="B"&&RG=="G"){
                    if(greaterEqual(RGV, YBV)){G=Fraction("1"); B=((Fraction("1")).sub(RGV)).add(YBV);}
                    else{G=((Fraction("1")).sub(YBV)).add(RGV); B=Fraction("1");}
                    R=(Fraction("1")).sub(max());
                }
                R=L.mul(R); G=L.mul(G); B=L.mul(B);

                R=(R.mul(Fraction("255"))).round().valueOf(); G=(G.mul(Fraction("255"))).round().valueOf(); B=(B.mul(Fraction("255"))).round().valueOf();
                return "rgb("+R+", "+G+", "+B+")";
                function max(){if(greaterEqual(YBV, RGV)) return YBV; else return RGV;}
                function greaterEqual(first, next){if(first.compare(next)>=0) return true; else return false;} //greater than or equal to
            }
        </script>
    </body>
</html>
